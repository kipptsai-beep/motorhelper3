name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Java 17 環境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 下載並安裝 Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle-install
          echo "$HOME/gradle-install/gradle-8.4/bin" >> $GITHUB_PATH

      - name: 產生 gradlew
        run: gradle wrapper --gradle-version=8.4 --distribution-type=bin

      - name: 給予 gradlew 執行權限
        run: chmod +x gradlew

      - name: 打包 APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 上傳 APK
        uses: actions/upload-artifact@v4
        with:
          name: MotoHelper-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
